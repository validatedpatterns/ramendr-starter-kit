- name: Set aws region
  ansible.builtin.set_fact:
    aws_region: "{{ vars[vpc.value.region ~ '_aws_region'] }}"


- name: Find VPC ID by Tag {{ instance.key }}
  amazon.aws.ec2_vpc_net_info:
    filters: 
      "tag:Name": "{{ vpc.key }}-vpc"
      "tag:washere": "{{ aws_arn_userid }}"
    region: "{{ aws_region }}"
    profile: "{{ aws_profile }}"
  register: vpc_info

# # delete vpc peering
- name: Gather info VPC Peering Connection
  amazon.aws.ec2_vpc_peering_info:
    region: "{{ aws_region }}"
    filters:
      requester-vpc-info.vpc-id: ["{{ vpc_id }}"]
  register: vpc_peer_info
  vars:
    vpc_id: "{{ vpc_info.vpcs | map(attribute='vpc_id') | first  }}"

- debug:
    msg: "{{ vpc_peer_info.vpc_peering_connections | map(attribute='vpc_peering_connection_id') }}"


- name: Delete a local EC2 VPC Peering Connection
  amazon.aws.ec2_vpc_peering:
    region: "{{ aws_region }}"
    peering_id: "{{ item }}"
    state: "absent"
  loop: "{{ vpc_peer_info.vpc_peering_connections | map(attribute='vpc_peering_connection_id') }}"
  when: "{{ vpc_peer_info.vpc_peering_connections | map(attribute='vpc_peering_connection_id') | length > 0 }}"

